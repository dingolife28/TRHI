<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biopulse Emergence — TRHI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #080f0a;
        }

        /* p5.js canvas — Vollbild-Hintergrund, nicht-interaktiv */
        canvas {
            position: fixed;
            inset: 0;
            display: block;
        }
    </style>
</head>
<body>
<script>
// ═══════════════════════════════════════════════════════════════
// BIOPULSE EMERGENCE — TRHI (Hintergrund-Variante, text-frei)
// Partikelsystem extrahiert aus art/biopulse-emergence.html
// Konzept: ATP-Moleküle fließen durch metabolische Pfade
// ═══════════════════════════════════════════════════════════════

let params = {
    seed:          7842,
    particleCount: 1400,
    pulseRate:     0.7,
    noiseScale:    0.004,
    fadeAmount:    8,
    flowSpeed:     1.2,
    colorRest:   '#1b4332',
    colorActive: '#52b788',
    colorEnergy: '#f4a261'
};

// Parsed color channels
let cRest, cActive, cEnergy;

let particles = [];
let flowField = [];
let cols, rows;
const SCL = 12;
let globalTime = 0;

// ─────────────────────────────────────
// COLOUR UTILITIES
// ─────────────────────────────────────
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r, g, b];
}

function parseColors() {
    cRest   = hexToRgb(params.colorRest);
    cActive = hexToRgb(params.colorActive);
    cEnergy = hexToRgb(params.colorEnergy);
}

function lerpColor3(a, b, t) {
    return [
        lerp(a[0], b[0], t),
        lerp(a[1], b[1], t),
        lerp(a[2], b[2], t)
    ];
}

// ─────────────────────────────────────
// FLOW FIELD GENERATION
// 3-octave Perlin noise + centripetal spiral bias
// ─────────────────────────────────────
function generateFlowField(t) {
    const ns = params.noiseScale;
    const idx = (col, row) => row * cols + col;

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            const wx = col * SCL;
            const wy = row * SCL;

            // Octave 1 — macro flow (slow)
            const a1 = noise(wx * ns,             wy * ns,             t * 0.004) * TWO_PI * 2;
            // Octave 2 — cellular eddies (medium)
            const a2 = noise(wx * ns * 2.8 + 100, wy * ns * 2.8 + 100, t * 0.007) * PI;
            // Octave 3 — molecular micro-turbulence
            const a3 = noise(wx * ns * 7.1 + 250, wy * ns * 7.1 + 250, t * 0.003) * PI * 0.35;

            // Spiral bias: subtle centripetal curl toward center
            const dx = wx - width  * 0.5;
            const dy = wy - height * 0.5;
            const spiral = atan2(dy, dx) + HALF_PI;

            const angle = a1 + a2 * 0.28 + a3 * 0.09 + spiral * 0.07;
            flowField[idx(col, row)] = angle;
        }
    }
}

// ─────────────────────────────────────
// PARTICLE CLASS — ATP Molecule Agent
// ─────────────────────────────────────
class Particle {
    constructor() {
        this.init(true);
    }

    init(scattered) {
        this.x = scattered ? random(width) : random(width * 0.3, width * 0.7);
        this.y = scattered ? random(height) : random(height * 0.3, height * 0.7);
        this.vx = 0;
        this.vy = 0;
        this.maxAge = random(200, 500);
        this.age    = scattered ? random(this.maxAge) : 0;
        this.vitality  = random(0.35, 1.0);   // intrinsic energy level
        this.baseSize  = random(1.2, 3.5);
        this.phaseOff  = random(TWO_PI);       // heartbeat phase offset
    }

    update() {
        const col = constrain(floor(this.x / SCL), 0, cols - 1);
        const row = constrain(floor(this.y / SCL), 0, rows - 1);
        const angle = flowField[row * cols + col] || 0;

        // Heartbeat modulation: ~60 BPM encoded at pulseRate=1.0
        const beat  = sin(globalTime * 0.042 * params.pulseRate + this.phaseOff);
        const speed = params.flowSpeed * this.vitality * (0.75 + beat * 0.35);

        this.vx = this.vx * 0.88 + cos(angle) * speed * 0.4;
        this.vy = this.vy * 0.88 + sin(angle) * speed * 0.4;

        this.x += this.vx;
        this.y += this.vy;
        this.age++;

        if (this.x < -5 || this.x > width + 5 ||
            this.y < -5 || this.y > height + 5 ||
            this.age > this.maxAge) {
            this.init(false);
        }
    }

    draw() {
        // Life envelope: smooth fade in/out
        const lifeT  = this.age / this.maxAge;
        const life   = sin(lifeT * PI);  // 0 → 1 → 0

        // Velocity magnitude → energy state
        const spd    = sqrt(this.vx * this.vx + this.vy * this.vy);
        const spdN   = constrain(spd / (params.flowSpeed * 2), 0, 1);

        // Heartbeat size pulse
        const beat   = sin(globalTime * 0.042 * params.pulseRate + this.phaseOff) * 0.5 + 0.5;
        const sz     = this.baseSize * (0.7 + beat * 0.5) * life;
        if (sz < 0.3) return;

        // Color: rest(green) → active(emerald) → energy(amber)
        let col;
        if (spdN < 0.45) {
            col = lerpColor3(cRest, cActive, spdN / 0.45);
        } else {
            col = lerpColor3(cActive, cEnergy, (spdN - 0.45) / 0.55);
        }

        const alpha = life * this.vitality * 210;

        noStroke();

        // Outer glow halo
        fill(col[0], col[1], col[2], alpha * 0.18);
        circle(this.x, this.y, sz * 5.5);

        // Mid glow
        fill(col[0], col[1], col[2], alpha * 0.4);
        circle(this.x, this.y, sz * 2.2);

        // Core — bright nucleus
        fill(col[0] + 40, col[1] + 40, col[2] + 30, alpha * 0.95);
        circle(this.x, this.y, sz);
    }
}

// ─────────────────────────────────────
// P5.JS LIFECYCLE
// ─────────────────────────────────────
function setup() {
    parseColors();
    createCanvas(windowWidth, windowHeight);
    colorMode(RGB, 255);
    blendMode(ADD);
    initSystem();
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    initSystem();
}

function initSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);
    parseColors();

    cols = ceil(width  / SCL) + 1;
    rows = ceil(height / SCL) + 1;
    flowField = new Array(cols * rows).fill(0);

    globalTime = 0;
    particles = Array.from({ length: params.particleCount }, () => new Particle());

    // Paint initial dark background — #080f0a (8,15,10)
    blendMode(BLEND);
    background(8, 15, 10);
    blendMode(ADD);
}

function draw() {
    globalTime++;

    // Regenerate flow field each frame (living animation)
    generateFlowField(globalTime);

    // Fade overlay — creates organic trail memory (leicht, Text bleibt lesbar)
    blendMode(BLEND);
    noStroke();
    fill(8, 15, 10, params.fadeAmount);
    rect(0, 0, width, height);
    blendMode(ADD);

    // Update & draw all particles
    for (const p of particles) {
        p.update();
        p.draw();
    }
}
</script>
</body>
</html>
