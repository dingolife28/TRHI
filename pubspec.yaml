name: trhi_app
description: TRHI — The Real Health Insurance

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0
  url_launcher: ^6.2.0
  go_router: ^13.0.0
  intl: ^0.19.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  http: ^1.2.2
  qr_flutter: ^4.1.0
  webview_flutter: ^4.7.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/trhi_logo.svg
    - assets/trhi_logo.png
    - assets/mandala_bg.webp
    - assets/art/cellular-resonance-3d.html
    - assets/art/biopulse-emergence.html
